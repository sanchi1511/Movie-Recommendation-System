<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineMatch — Movie Recommender</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ─────────────────────────────────────────────── */
    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --card:      #1a1a26;
      --border:    #2a2a3e;
      --accent:    #e8401c;
      --accent2:   #f97316;
      --gold:      #f5c518;
      --text:      #f0eff4;
      --muted:     #7e7e9a;
      --radius:    10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      background: linear-gradient(180deg, #0f0f18 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 20px; flex-shrink: 0;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 2px;
      color: var(--text);
    }

    header h1 span { color: var(--accent); }

    header p {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── Hero / Search ──────────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 60px 24px 40px;
    }

    .hero-eyebrow {
      font-size: .7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .hero h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      line-height: 1;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .hero h2 em {
      font-style: normal;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 40px;
    }

    /* ── Search box ─────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      max-width: 560px;
      margin: 0 auto 12px;
    }

    .search-wrap input {
      width: 100%;
      padding: 16px 60px 16px 20px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }

    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }

    .search-wrap button {
      position: absolute;
      right: 6px; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px;
      background: var(--accent);
      border: none; border-radius: 50%;
      cursor: pointer;
      display: grid; place-items: center;
      transition: background .2s, transform .15s;
    }

    .search-wrap button:hover { background: var(--accent2); transform: translateY(-50%) scale(1.06); }

    .search-wrap button svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.2; }

    /* ── Autocomplete ───────────────────────────────────────── */
    .autocomplete {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      z-index: 100;
      display: none;
    }

    .autocomplete.open { display: block; }

    .autocomplete li {
      list-style: none;
      padding: 11px 20px;
      cursor: pointer;
      font-size: .9rem;
      transition: background .12s;
    }

    .autocomplete li:hover, .autocomplete li.active {
      background: var(--card);
      color: var(--accent2);
    }

    /* ── N slider ───────────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-size: .82rem;
      color: var(--muted);
    }

    .controls label { display: flex; align-items: center; gap: 8px; }

    input[type=range] {
      accent-color: var(--accent);
      width: 120px;
      cursor: pointer;
    }

    #n-val { color: var(--text); font-weight: 600; width: 18px; text-align: center; }

    /* ── State messages ─────────────────────────────────────── */
    #status {
      text-align: center;
      padding: 16px;
      font-size: .9rem;
      color: var(--muted);
      min-height: 40px;
    }

    #status.error { color: #f87171; }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results header ─────────────────────────────────────── */
    #results-section { max-width: 900px; margin: 0 auto; padding: 0 24px 60px; }

    .results-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 24px;
    }

    .results-header h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 1px;
    }

    .results-header .matched {
      font-size: .85rem;
      color: var(--muted);
    }

    .matched em { color: var(--accent2); font-style: normal; }

    /* ── Bar chart ──────────────────────────────────────────── */
    .bar-chart { margin-bottom: 36px; }

    .bar-row {
      display: grid;
      grid-template-columns: 220px 1fr 54px;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .bar-label {
      font-size: .82rem;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: default;
    }

    .bar-track {
      height: 22px;
      background: var(--surface);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width .6s cubic-bezier(.22,1,.36,1);
    }

    .bar-score {
      font-size: .78rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    /* ── Cards ──────────────────────────────────────────────── */
    .card-grid {
      display: grid;
      gap: 14px;
    }

    .movie-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: start;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity .4s, transform .4s;
    }

    .movie-card.visible { opacity: 1; transform: translateY(0); }

    .rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--border);
      line-height: 1;
      width: 36px;
      text-align: right;
      padding-top: 2px;
    }

    .card-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .75rem;
      color: var(--muted);
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: .7rem;
      font-weight: 500;
    }

    .badge-sim {
      background: rgba(232,64,28,.18);
      color: var(--accent2);
    }

    .badge-rating {
      background: rgba(245,197,24,.12);
      color: var(--gold);
      display: flex; align-items: center; gap: 3px;
    }

    .card-overview {
      font-size: .8rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: .72rem;
      color: var(--border);
      border-top: 1px solid var(--border);
    }

    footer span { color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="logo-icon">🎬</div>
  <div>
    <h1>Cine<span>Match</span></h1>
    <p>Content-Based Movie Recommender</p>
  </div>
</header>

<section class="hero">
  <p class="hero-eyebrow">TF-IDF · Cosine Similarity</p>
  <h2>Find Your Next <em>Favourite</em><br>Film</h2>
  <p class="hero-sub">Type a movie you love — we'll find what to watch next.</p>

  <div class="search-wrap">
    <input id="movie-input" type="text" placeholder="e.g. The Godfather" autocomplete="off" />
    <button id="search-btn" aria-label="Search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    </button>
    <ul class="autocomplete" id="autocomplete"></ul>
  </div>

  <div class="controls">
    <label>
      Recommendations:
      <input type="range" id="n-slider" min="3" max="20" value="10" />
      <span id="n-val">10</span>
    </label>
  </div>
</section>

<div id="status"></div>

<section id="results-section" style="display:none">
  <div class="results-header">
    <h3>Recommendations</h3>
    <span class="matched" id="matched-label"></span>
  </div>
  <div class="bar-chart" id="bar-chart"></div>
  <div class="card-grid" id="card-grid"></div>
</section>

<footer>Built with <span>TF-IDF + Cosine Similarity</span> · Flask + scikit-learn</footer>

<script>
  const input      = document.getElementById('movie-input');
  const btn        = document.getElementById('search-btn');
  const acList     = document.getElementById('autocomplete');
  const slider     = document.getElementById('n-slider');
  const nVal       = document.getElementById('n-val');
  const statusEl   = document.getElementById('status');
  const resultsEl  = document.getElementById('results-section');
  const barChart   = document.getElementById('bar-chart');
  const cardGrid   = document.getElementById('card-grid');
  const matchLabel = document.getElementById('matched-label');

  slider.addEventListener('input', () => { nVal.textContent = slider.value; });

  // ── Autocomplete ─────────────────────────────────────────────────────────
  let acTimer;
  let acActive = -1;

  input.addEventListener('input', () => {
    clearTimeout(acTimer);
    const q = input.value.trim();
    if (q.length < 2) { closeAc(); return; }
    acTimer = setTimeout(() => fetchSuggestions(q), 200);
  });

  async function fetchSuggestions(q) {
    try {
      const res = await fetch(`/suggest?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      renderAc(data);
    } catch { closeAc(); }
  }

  function renderAc(items) {
    acList.innerHTML = '';
    acActive = -1;
    if (!items.length) { closeAc(); return; }
    items.forEach(title => {
      const li = document.createElement('li');
      li.textContent = title;
      li.addEventListener('mousedown', (e) => {
        e.preventDefault();
        input.value = title;
        closeAc();
        search();
      });
      acList.appendChild(li);
    });
    acList.classList.add('open');
  }

  function closeAc() { acList.classList.remove('open'); acList.innerHTML = ''; acActive = -1; }

  input.addEventListener('keydown', (e) => {
    const items = acList.querySelectorAll('li');
    if (!items.length) {
      if (e.key === 'Enter') search();
      return;
    }
    if (e.key === 'ArrowDown') { e.preventDefault(); setAc(acActive + 1, items); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setAc(acActive - 1, items); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      if (acActive >= 0) { input.value = items[acActive].textContent; closeAc(); search(); }
      else { closeAc(); search(); }
    }
    else if (e.key === 'Escape') closeAc();
  });

  function setAc(idx, items) {
    items.forEach(li => li.classList.remove('active'));
    acActive = Math.max(-1, Math.min(idx, items.length - 1));
    if (acActive >= 0) items[acActive].classList.add('active');
  }

  document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrap')) closeAc(); });

  // ── Search ────────────────────────────────────────────────────────────────
  btn.addEventListener('click', search);

  async function search() {
    const movie = input.value.trim();
    if (!movie) return;

    statusEl.className = '';
    statusEl.innerHTML = '<span class="spinner"></span> Finding recommendations…';
    resultsEl.style.display = 'none';

    try {
      const res = await fetch('/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ movie, n: parseInt(slider.value) })
      });
      const data = await res.json();

      if (!res.ok) {
        statusEl.className = 'error';
        statusEl.textContent = data.error || 'Something went wrong.';
        return;
      }

      statusEl.textContent = '';
      renderResults(data);
    } catch (err) {
      statusEl.className = 'error';
      statusEl.textContent = 'Could not reach the server. Is the app running?';
    }
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function renderResults({ matched_title, recommendations }) {
    matchLabel.innerHTML = `Results for <em>${matched_title}</em>`;

    // Bar chart
    const maxScore = recommendations[0]?.similarity_score || 1;
    barChart.innerHTML = recommendations.map((r, i) => `
      <div class="bar-row">
        <span class="bar-label" title="${r.title}">${r.title}</span>
        <div class="bar-track">
          <div class="bar-fill" data-width="${(r.similarity_score / maxScore * 100).toFixed(1)}"></div>
        </div>
        <span class="bar-score">${r.similarity_score.toFixed(3)}</span>
      </div>
    `).join('');

    // Cards
    cardGrid.innerHTML = recommendations.map((r, i) => `
      <div class="movie-card" data-idx="${i}">
        <div class="rank">${String(i + 1).padStart(2, '0')}</div>
        <div>
          <div class="card-title">${r.title}</div>
          <div class="card-meta">
            ${r.year !== 'N/A' ? `<span>${r.year}</span>` : ''}
            <span class="badge badge-sim">Match ${(r.similarity_score * 100).toFixed(1)}%</span>
            ${r.vote_average ? `<span class="badge badge-rating">★ ${r.vote_average}</span>` : ''}
          </div>
          <div class="card-overview">${r.overview}</div>
        </div>
      </div>
    `).join('');

    resultsEl.style.display = 'block';

    // Animate bars after paint
    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill').forEach(el => {
        el.style.width = el.dataset.width + '%';
      });
      document.querySelectorAll('.movie-card').forEach((card, i) => {
        setTimeout(() => card.classList.add('visible'), i * 50);
      });
    });
  }
</script>
</body>
</html>
